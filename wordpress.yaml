apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: kuberkid
  labels:
    tier: frontend 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress
      tier: frontend
  template:
    metadata:
      labels:
        app: wordpress
        tier: frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube
      containers:
      - name: wordpress
        image: wordpress
        env:
        - name: WORDPRESS_DB_HOST
          value: mysql:3306  
        - name: WORDPRESS_DB_NAME
          value: "wordpress_db"
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: secret-wordpress
              key: password
        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: secret-wordpress
              key: username
        ports:
        - containerPort: 80

      
